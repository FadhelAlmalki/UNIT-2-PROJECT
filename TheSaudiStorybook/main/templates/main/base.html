{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body{% if 'mode' in request.COOKIES and request.COOKIES.mode == 'dark' %} class="dark-mode"{% endif %}>
    <header class="site-header">
        <div class="site-header-inner container-fluid px-4 px-md-5">
            <nav class="mode-nav" aria-label="Color mode">
                <a class="mode-toggle-link" href="{% url 'main:mode_view' 'light' %}?next={{request.path}}" aria-label="Light mode">
                    <span class="material-symbols-outlined {% if 'mode' not in request.COOKIES or request.COOKIES.mode != 'dark' %}active-icon{% endif %}">light_mode</span>
                </a>
                <a class="mode-toggle-link" href="{% url 'main:mode_view' 'dark' %}?next={{request.path}}" aria-label="Dark mode">
                    <span class="material-symbols-outlined {% if 'mode' in request.COOKIES and request.COOKIES.mode == 'dark' %}active-icon{% endif %}">dark_mode</span>
                </a>
            </nav>

            <div class="text-center mb-4 site-brand">
                <h2 class="display-6 fw-bold">The Saudi Storybook</h2>
                <p class="lead mb-0">Explore each chapter of Saudi Arabia's story.</p>
            </div>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 The Saudi Storybook. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
